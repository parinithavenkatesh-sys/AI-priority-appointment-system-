<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Appointment</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">
  <h2>Book Appointment</h2>

  <label>Patient Name</label>
  <input type="text" id="name">

  <label>Age</label>
  <input type="number" id="age">

  <label>Appointment Date</label>
  <input type="date" id="date">

  <label>Select Symptoms</label>
  <div class="symptoms-box" id="symptomsBox"></div>

  <!-- PAYMENT -->
  <label>Payment Method</label>
  <select id="payment" onchange="showPaymentSection()">
    <option value="">Select</option>
    <option value="upi">UPI (GPay / PhonePe)</option>
  </select>

  <!-- UPI -->
  <div id="upiSection" style="display:none; text-align:center; margin-top:20px;">
    <h3>Scan & Pay ₹500</h3>

    <img id="qrCode" style="width:200px;height:200px;margin:10px;"><br>

    <a id="upiPayBtn"
       onclick="startPayment()"
       style="padding:10px 20px;background:green;color:white;border-radius:8px;cursor:pointer;">
       Pay via UPI
    </a>
  </div>

  <br>

  <!-- BOOK BUTTON -->
  <button id="bookBtn" onclick="bookAppointment()" disabled
    style="opacity:0.5;cursor:not-allowed;">
    Book Appointment
  </button>

</div>

<script>

var upiID = "parinithavenkatesh30@okaxis";
var amount = "500";
var hospitalName = "FirstCareHospital";
var paymentDone = false;

// SHOW QR
function showPaymentSection(){
  const payment = document.getElementById("payment").value;

  if(payment === "upi"){
    document.getElementById("upiSection").style.display = "block";

    var upiLink = "upi://pay?pa=" + upiID +
                  "&pn=" + hospitalName +
                  "&am=" + amount +
                  "&cu=INR";

    document.getElementById("qrCode").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" 
      + encodeURIComponent(upiLink);

    document.getElementById("upiPayBtn").dataset.link = upiLink;
  }
}

// START PAYMENT
function startPayment(){

  let link = document.getElementById("upiPayBtn").dataset.link;

  // open UPI
  window.location.href = link;

  // simulate payment success
  setTimeout(() => {

    paymentDone = true;

    alert("✅ Payment Successful!");

    let btn = document.getElementById("bookBtn");
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";

  }, 4000);
}

// BOOK APPOINTMENT
function bookAppointment(){

  if(!paymentDone){
    alert("Please complete payment first ❌");
    return;
  }

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const date = document.getElementById("date").value;

  const selectedSymptoms = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(cb => cb.value);

  if(!name || !age || !date || selectedSymptoms.length === 0){
    alert("Fill all details");
    return;
  }

  fetch("/booking", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      age: age,
      symptoms: selectedSymptoms.join(", "),
      payment_done: paymentDone
    })
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "success"){
      alert("Booking Successful ✅");

      // ✅ REDIRECT FIXED
      window.location.href = "/doctor-login";

    } else {
      alert(data.message);
    }

  });
}

// SYMPTOMS

  box.innerHTML += `<label><input type="checkbox" value="${s}"> ${s}</label><br>`;
});

</script>

</html>
